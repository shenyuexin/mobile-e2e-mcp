name: OCR Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "packages/adapter-vision/**"
      - "tests/fixtures/ocr/**"
      - "scripts/sync-ocr-fixtures.ts"
      - "scripts/validate-ocr-fixtures.ts"
      - "package.json"
      - "pnpm-lock.yaml"
  pull_request:
    paths:
      - "packages/adapter-vision/**"
      - "tests/fixtures/ocr/**"
      - "scripts/sync-ocr-fixtures.ts"
      - "scripts/validate-ocr-fixtures.ts"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  macos-ocr-smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:ocr-fixtures
      - run: pnpm test:ocr-smoke
