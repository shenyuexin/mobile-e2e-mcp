platform: ios
rules:
  - id: save-password-en
    match:
      any_text:
        - Save Password
        - Not Now
    action:
      tap_text: Not Now
    priority: high
    auto: true
  - id: save-password-zh
    match:
      any_text:
        - 存储密码
        - 以后
    action:
      tap_text: 以后
    priority: high
    auto: true
notes:
  - iOS password-save prompts are treated as known golden-flow interruptions.
  - Unknown iOS interruptions must be captured in screenshots and debug output before new rules are added.
